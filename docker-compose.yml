version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: auraos-postgres
    environment:
      POSTGRES_USER: auraos_user
      POSTGRES_PASSWORD: auraos_password
      POSTGRES_DB: auraos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auraos_user']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
