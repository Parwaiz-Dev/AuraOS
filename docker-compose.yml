services:
  postgres:
    image: postgres:15-alpine
    container_name: auraos-postgres
    environment:
      POSTGRES_USER: auraos_user
      POSTGRES_PASSWORD: auraos_password
      POSTGRES_DB: auraos
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auraos_user -d auraos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auraos-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: auraos-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://auraos_user:auraos_password@postgres:5432/auraos
      REDIS_URL: redis://redis:6379
      # CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-analytics:
    build:
      context: ./ai-analytics-service
      dockerfile: Dockerfile
    container_name: auraos-ai-analytics
    env_file:
      - ./ai-analytics-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://auraos_user:auraos_password@postgres:5432/auraos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_here_min_32_chars_change_production_12345
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: auraos-frontend
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: auraos-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - ai-analytics

volumes:
  postgres_data:
  redis_data:
