server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (they have content hashes in filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker and PWA manifest — no caching
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: serve index.html for all routes that don't match a file
    # This lets React Router handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching of index.html so users always get the latest version
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}