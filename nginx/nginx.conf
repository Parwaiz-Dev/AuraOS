# ── Production Reverse Proxy ──────────────────────────────────────────────────
# Entry point for all traffic. Routes /api/* and /socket.io/* to the backend,
# everything else to the frontend (which handles SPA fallback & static caching).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow same-origin resources, inline styles (tailwind), and data: URIs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # Disable server version disclosure
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # ── Proxy headers (forwarded to upstreams) ────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Backend API ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        # Increase timeouts for long-running API calls
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── AI Analytics Service ──────────────────────────────────────────────
    location /analytics/ {
        proxy_pass http://ai-analytics:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── Socket.io (WebSocket upgrade) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Long timeout for persistent WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend (SPA + static assets) ────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
    }

    # ── Health check (reverse-proxy level) ────────────────────────────────
    location = /proxy-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}