# ── Production Reverse Proxy ──────────────────────────────────────────────────
# Entry point for all traffic. Routes /api/* and /socket.io/* to the backend,
# everything else to the frontend (which handles SPA fallback & static caching).
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones (must be in http context — included via nginx.conf) ──
# General API: 20 requests/sec per IP, burst up to 40
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
# Auth endpoints: 5 requests/sec per IP (login/register brute-force protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Max upload body size — covers menu-image and document uploads.
client_max_body_size 10m;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # ── Proxy headers (forwarded to upstreams) ────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Auth endpoints (tighter rate limit) ───────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Backend API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── AI Analytics Service ──────────────────────────────────────────────
    location /analytics/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://ai-analytics:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── Socket.io (WebSocket upgrade) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend (SPA + static assets) ────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
    }

    # ── Certbot ACME challenge ────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Health check (reverse-proxy level) ────────────────────────────────
    location = /proxy-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

